  site-url: "https://cffgmx.github.io/proyectos/isl-esp"
  page-navigation: true
  search: true
  favicon: favicon.png

  sidebar:
    style: docked
    contents:
      - section: "El libro"
        contents:
          - href: index.qmd
            text: Portada
          - href: chapters/00-prefacio/index.qmd
            text: Prefacio
      - section: "Capítulos"
        contents:
          - href: chapters/01-introduccion/index.qmd
            text: "1. Introducción"
          - href: chapters/02-aprendizaje-estadistico/index.qmd
            text: "2. Aprendizaje Estadístico"
          - href: chapters/03-regresion-lineal/index.qmd
            text: "3. Regresión Lineal"
          - href: chapters/04-clasificacion/index.qmd
            text: "4. Clasificación"
          - href: chapters/05-metodos-remuestreo/index.qmd
            text: "5. Métodos de Remuestreo"
          - href: chapters/06-seleccion-modelos/index.qmd
            text: "6. Selección de Modelos Lineales y Regularización"
          - href: chapters/07-mas-alla-linealidad/index.qmd
            text: "7. Más Allá de la Linealidad"
          - href: chapters/08-arboles-decision/index.qmd
            text: "8. Métodos Basados en Árboles"
          - href: chapters/09-svm/index.qmd
            text: "9. Máquinas de Vectores de Soporte"
          - href: chapters/10-aprendizaje-profundo/index.qmd
            text: "10. Aprendizaje Profundo"
          - href: chapters/11-analisis-supervivencia/index.qmd
            text: "11. Análisis de Supervivencia y Datos Censurados"
          - href: chapters/12-aprendizaje-no-supervisado/index.qmd
            text: "12. Aprendizaje No Supervisado"
          - href: chapters/13-pruebas-multiples/index.qmd
            text: "13. Pruebas Múltiples"

format:
  html:
    lang: es
    crossref:
      chapters: true
      fig-title: Figura
      tbl-title: Tabla
    theme:
      - cosmo
      - custom.scss
    toc: false
    code-fold: false
    code-tools: false
    include-in-header:
      - text: |
          <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
      - text: |
          <script>(function(){var t;try{t=localStorage.getItem('isl-theme')}catch(e){}if(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)t='dark';if(!t)t='light';document.documentElement.setAttribute('data-bs-theme',t)})();</script>
      - text: |
          <script>
          (function(){'use strict';var b='',m=document.querySelector('meta[name="quarto:site-url"]');if(m){b=m.getAttribute('content');if(!b.endsWith('/'))b+='/'}else{var p=window.location.pathname.split('/');var d=(window.location.pathname.match(/chapters\//g)||[]).length;b=window.location.origin+p.slice(0,-(2*d+1)||1).join('/')+'/'}var j=b+'figures-map.json';fetch(j).then(function(r){return r.json()}).then(function(map){document.querySelectorAll('a.quarto-xref').forEach(function(a){var h=a.getAttribute('href');if(!h)return;var m=h.match(/#(fig-[\w-]+)/);if(!m)return;var k=m[1];if(!map[k])return;var u=b+map[k];a.setAttribute('data-preview','');a.style.setProperty('--preview-img','url('+u+')')})}).catch(function(e){console.warn('preview: no se pudo cargar figures-map.json',e)})})();
          </script>
    include-after-body:
      - text: |
          <div style="position:fixed;bottom:24px;right:24px;z-index:9999">
            <button id="theme-toggle-btn" style="width:44px;height:44px;border-radius:50%;border:1px solid var(--bs-border-color,#dee2e6);background:var(--bs-body-bg,#fff);color:var(--bs-body-color,#1a1a1a);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);padding:0;opacity:.85;transition:transform .2s,box-shadow .2s,opacity .2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.85'" aria-label="Cambiar tema" title="Cambiar tema claro/oscuro" onclick="var c=document.documentElement.getAttribute('data-bs-theme')||'light';var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-bs-theme',n);try{localStorage.setItem('isl-theme',n)}catch(e){}document.getElementById('theme-toggle-btn').textContent=n==='dark'?'☀️':'🌙'">🌙</button>
          </div>
          <script>document.getElementById('theme-toggle-btn').textContent=(document.documentElement.getAttribute('data-bs-theme')||'light')==='dark'?'☀️':'🌙'</script>

execute:
  echo: false
  eval: true
  warning: false


